name: finch
description: A fast, lightweight Dart web framework for building scalable server-side apps and APIs with MongoDB, MySQL, SQLite, WebSockets,...

version: 1.1.3
homepage: https://finchdart.com/
repository: https://github.com/uproid/finch.git
issue_tracker: https://github.com/uproid/finch/issues

platforms:
  linux:
  windows:
  macos:
  ios:
  android: 
funding:
  - https://github.com/sponsors/uproid

topics:
  - webapp
  - server
  - api
  - database
  - websocket
  
sdk:
  dart:

environment:
  sdk: '>=3.0.0 <4.0.0'

dev_dependencies:
  build_runner: ^2.12.2
  test: ^1.30.0
  html: ^0.15.6
  lints: ^6.1.0

# Add regular dependencies here.
dependencies:
  path: ^1.9.1
  dotenv: ^4.2.0
  json_annotation: ^4.11.0
  mongo_dart: ^0.10.8
  encrypt: ^5.0.3
  crypto: ^3.0.7
  logger: ^2.7.0
  mailer: ^7.1.0
  jinja: ^0.6.5  
  intl: ^0.20.2
  mime: ^2.0.0 
  cron: ^0.6.2
  base32: ^2.2.0
  archive: ^4.0.9
  http: ^1.6.0
  capp: ^1.1.8
  mysql_client: ^0.0.27
  sqlite3: ^3.3.1
  sqler: ^1.2.0
  html_unescape: ^2.0.0
  yaml: ^3.1.3
executables:
  finch: finch

finch:
  serve: ./example/lib/serve.dart
  app: ./example/lib/serve.dart
  mysql_migrate:
    path: ./example/migrations

