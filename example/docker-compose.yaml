services:
  finch:
    hostname: finch
    container_name: finch
    image: uproid/finch:latest
    restart: always
    ports:
      - "8085:8085"
      - "8181:8181"
    environment:
      SQLITE_PATH: /www/sqlite/example_database.sqlite
      # MongoDB Configuration
      ENABLE_DATABASE: true
      MONGODB_CONNECTION: mongodb
      MONGODB_PORT: 27017
      MONGODB_NAME: database_name
      MONGODB_AUTH: admin
      MONGODB_PASSWORD: PasswordMongoDB
      MONGODB_USER: root
    build:
      context: .
    volumes:
      - ./lib/:/www/lib/
      - ./public/:/www/public/
      - ./sqlite/:/www/sqlite/

  nodejs:
    image: node:20-alpine
    container_name: nodejs
    hostname: nodejs
    working_dir: /app
    tty: true
    stdin_open: true
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run tailwind:watch"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    hostname: nginx
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ${PWD-.}/public/:/var/www/html/public
      - ${PWD-.}/docker/nginx.conf:/etc/nginx/conf.d/default.conf

  mongodb:
    image: mongo:latest
    container_name: mongodb
    hostname: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: PasswordMongoDB
    ports:
      - "27018:27017"
    volumes:
      - ${PWD-.}/mongodb:/data/db

  mysql:
    image: mysql:latest
    container_name: mysql
    hostname: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example_password
      MYSQL_DATABASE: example_db
      MYSQL_USER: example_user
      MYSQL_PASSWORD: example_password
    ports:
      - "3306:3306"
    volumes:
      - ${PWD-.}/mysql:/var/lib/mysql
    networks:
      - default
