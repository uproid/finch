    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP Server (Example)</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/effects/wave/wave.css" />
    <!-- Local built Tailwind CSS (generated via Tailwind CLI) -->
    <link rel="stylesheet" href="/assets/generated-tailwind.css" />

  <body class="bg-gray-50 font-serif antialiased overflow-x-hidden">
    <div class="flex items-center justify-center p-4" style="min-height: 50vh;">
      <div class="bg-white rounded-lg p-8 shadow-lg" style="width: 500px; line-height: 1.6;">
        <!-- Markdown Title -->
        <h1 class="text-2xl font-bold text-gray-900 mb-6 pb-2 border-b-2 border-gray-300">MCP Server (Example)</h1>

        <div class="space-y-6 text-gray-800">

            <p class="text-sm font-semibold text-gray-900 mb-2">Link:</p>
            <code class="block w-full bg-gray-100 px-3 py-2 rounded text-sm font-mono break-all">{{ url }}</code>
          </div>
          <div>
            <p class="text-sm font-semibold text-gray-900 mb-2">Type:</p>
            <code class="block w-full bg-gray-100 px-3 py-2 rounded text-sm font-mono">{{ type }}</code>
          </div>
          <div>
            <p class="text-sm font-semibold text-gray-900 mb-2">API Key:</p>
            <code class="block w-full bg-gray-100 px-3 py-2 rounded text-sm font-mono break-all">{{ apikey }}</code>
          </div>
        </div>
      </div>
    </div>
